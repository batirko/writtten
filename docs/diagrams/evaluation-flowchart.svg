<rect class="c-teal" x="30" y="1108" width="12" height="12" rx="3"/><text class="ts" x="48" y="1118" font-size="10.5">fast · section</text>
<rect class="c-purple" x="170" y="1108" width="12" height="12" rx="3"/><text class="ts" x="188" y="1118" font-size="10.5">strong · doc</text>
