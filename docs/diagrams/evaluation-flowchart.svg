<text class="ts" x="238" y="328" text-anchor="middle" font-size="10">no</text>
<path d="M360,377 L360,408" stroke="var(--text-muted)" fill="none" stroke-width="1.4" marker-end="url(#ah)"/>
<text class="ts" x="372" y="398" text-anchor="start" font-size="10">yes</text>

<path d="M360,464 L360,474" stroke="var(--text-muted)" fill="none" stroke-width="1.4" marker-end="url(#ah)"/>
